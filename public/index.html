<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Social Publisher Dashboard</title>
<style>
:root{color-scheme:dark;--line:#20232a;--text:#f5f7fa;--muted:#8b8f98}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#151922,#050505 55%);color:var(--text)}.wrap{max-width:1500px;margin:0 auto;padding:24px}.top,.toolbar,.row,.actions{display:flex;gap:10px;flex-wrap:wrap}.top{align-items:center;justify-content:space-between}.title{font-size:28px;font-weight:800}.sub{color:var(--muted);margin-top:6px}.grid{display:grid;grid-template-columns:380px 1fr;gap:18px;margin-top:18px}.panel{background:rgba(16,17,19,.94);border:1px solid var(--line);border-radius:20px}.left,.right{padding:18px}.jobs{display:flex;flex-direction:column;gap:10px;max-height:72vh;overflow:auto;padding-right:4px;margin-top:14px}.job{padding:14px;border:1px solid var(--line);border-radius:16px;background:#0d0f13;cursor:pointer}.job.active{border-color:#2f8f75;box-shadow:0 0 0 1px #2f8f75 inset}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}.badge{font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);color:#d8dde5}.badge.draft{color:#fef3c7}.badge.published{color:#bbf7d0}.badge.failed{color:#fecaca}.badge.approved{color:#bfdbfe}.badge.rejected{color:#fda4af}.title2{font-weight:800;font-size:14px}.excerpt{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}button,input,textarea,select{border-radius:12px;border:1px solid var(--line);background:#171a20;color:var(--text);padding:10px 12px;font:inherit}button{cursor:pointer}button.primary{background:linear-gradient(135deg,#1f7a61,#34d399);color:#04110d;border:none;font-weight:800}button.warn{background:#34260a;color:#ffd898}button.bad{background:#3a1113;color:#ffc6c6}input,select{width:100%}textarea{width:100%;min-height:220px;resize:vertical;line-height:1.55;white-space:pre-wrap}.detail{display:grid;grid-template-columns:1fr;gap:16px}.field{display:flex;flex-direction:column;gap:8px}.row>*{flex:1}.mono{font-family:Consolas,monospace;font-size:12px;color:var(--muted);word-break:break-all}.empty{padding:28px;color:var(--muted);text-align:center}.small{font-size:12px;color:var(--muted)}#originalText,#proposedText{min-height:360px}#personalComment{min-height:120px}#publishResult{min-height:140px}@media(max-width:1100px){.grid{grid-template-columns:1fr}.jobs{max-height:42vh}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><div class="title">Social Publisher Dashboard</div><div class="sub">Duyệt nội dung, sửa bài, tạo draft, đăng Facebook/TikTok.</div></div>
    <div class="toolbar"><button class="primary" id="scanBtn">Quét nội dung mới</button><button id="refreshBtn">Làm mới</button><button id="pasteBtn">Dán bài Facebook</button></div>
  </div>
  <div class="grid">
    <div class="panel left">
      <h3>Danh sách job</h3>
      <div class="row"><input id="searchBox" placeholder="Tìm tiêu đề / nội dung / ghi chú..." /></div>
      <div class="small" id="countLine" style="margin:10px 0"></div>
      <div class="row"><select id="statusFilter"><option value="">Tất cả trạng thái</option><option value="draft">Draft</option><option value="approved">Approved</option><option value="published">Published</option><option value="failed">Failed</option><option value="rejected">Rejected</option><option value="__media_review">Cần đối chiếu media</option></select><button id="newManualBtn">Tạo tay</button></div>
      <div class="row" style="margin-top:10px"><select id="platformFilter"><option value="">Tất cả nền tảng</option><option value="facebook">Facebook</option><option value="youtube">YouTube</option><option value="tiktok">TikTok</option></select><select id="categoryFilter"><option value="">Tất cả thể loại</option></select></div>
      <div class="row" style="margin-top:10px"><select id="sortMode"><option value="time_desc">Mới nhất trước</option><option value="time_asc">Cũ nhất trước</option><option value="platform">Theo nền tảng</option><option value="category">Theo thể loại</option><option value="title">Theo tiêu đề</option></select></div>
      <div class="jobs" id="jobs"></div>
    </div>
    <div class="panel right">
      <div id="detailEmpty" class="empty">Chọn 1 job để duyệt.</div>
      <div id="detail" style="display:none">
        <div class="detail">
          <div class="field"><label>Tiêu đề</label><input id="title" disabled /><div class="mono" id="jobMeta"></div></div>
          <div class="row"><div class="field"><label>Target</label><select id="platformTarget"><option value="facebook">Facebook</option><option value="tiktok">TikTok</option></select></div><div class="field"><label>Đường dẫn video local</label><input id="videoFile" placeholder="D:\\path\\video.mp4 cho TikTok/AutoSocial" /></div></div>
          <div class="field"><label>Nội dung gốc</label><textarea id="originalText" disabled></textarea></div>
          <div class="field"><label>Nội dung sẽ đăng</label><textarea id="proposedText"></textarea></div>
          <div class="row"><div class="field"><label>Media review</label><select id="mediaReview"><option value="unknown">Unknown</option><option value="needs_review">Cần đối chiếu FB/video</option><option value="reviewed">Đã đối chiếu đủ</option></select></div><div class="field"><label>Ghi chú đối chiếu nguồn</label><textarea id="sourceNote" placeholder="VD: bài này còn video cần tải / đã đủ text / thiếu đoạn cuối video..."></textarea></div></div>
          <div class="field"><label>Suy nghĩ cá nhân</label><textarea id="personalComment" placeholder="Phần thêm riêng, sẽ xuống cuối bài"></textarea></div>
          <div class="field"><label>Kết quả gần nhất</label><textarea id="publishResult" disabled></textarea></div>
        </div>
        <div class="actions"><button id="refreshSourceBtn">Lấy lại nội dung gốc</button><button id="reconcileFbBtn">Tìm nguồn FB/media</button><button id="transcribeBtn">Transcribe video/media</button><button id="saveBtn">Lưu</button><button id="approveBtn">Duyệt</button><button class="warn" id="dryRunBtn">Test draft</button><button class="primary" id="publishBtn">Đăng ngay</button><button class="bad" id="rejectBtn">Loại</button><button class="bad" id="deleteBtn">Xóa</button></div>
        <div class="small" id="statusLine"></div>
      </div>
    </div>
  </div>
</div>
<script>
const qs=new URLSearchParams(location.search); const token=qs.get('token')||''; const el=id=>document.getElementById(id);
let jobs=[]; let active=null;
async function api(url,options={}){const headers={'content-type':'application/json',...(options.headers||{})}; if(token) headers['x-agent-token']=token; const res=await fetch(url,{...options,headers}); const data=await res.json().catch(()=>({ok:false,error:'JSON error'})); if(!res.ok) throw new Error(data.error||res.statusText); return data;}
function excerpt(t=''){return t.length>140?t.slice(0,140)+'…':t}
function renderCategoryOptions(){const cur=el('categoryFilter').value; const cats=[...new Set(jobs.map(j=>j.category||'Khac'))].sort(); el('categoryFilter').innerHTML='<option value="">Tất cả thể loại</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join(''); el('categoryFilter').value=cats.includes(cur)?cur:'';}
function filteredJobs(){ const status=el('statusFilter').value, platform=el('platformFilter').value, category=el('categoryFilter').value, sort=el('sortMode').value, q=(el('searchBox').value||'').toLowerCase(); let list=[...jobs]; if(status==='__media_review') list=list.filter(j=>j.media_review_status==='needs_review'); else if(status) list=list.filter(j=>j.status===status); if(platform) list=list.filter(j=>j.source.source_platform===platform); if(category) list=list.filter(j=>j.category===category); if(q) list=list.filter(j=>(`${j.source.title||''}\n${j.excerpt||''}`).toLowerCase().includes(q)); const time=j=>(j.sort_time||j.created_at||''); list.sort((a,b)=>{ if(sort==='time_asc') return time(a).localeCompare(time(b)); if(sort==='platform') return a.source.source_platform.localeCompare(b.source.source_platform)||time(b).localeCompare(time(a)); if(sort==='category') return (a.category||'').localeCompare(b.category||'')||time(b).localeCompare(time(a)); if(sort==='title') return (a.source.title||'').localeCompare(b.source.title||''); return time(b).localeCompare(time(a)); }); return list; }
function renderJobs(){ const list=filteredJobs(); el('countLine').textContent=`Hiển thị ${list.length}/${jobs.length} bài • cần media: ${jobs.filter(j=>j.media_review_status==='needs_review').length}`; const box=el('jobs'); box.innerHTML=list.length?list.map(j=>`<div class="job ${active&&active.id===j.id?'active':''}" data-id="${j.id}"><div class="meta"><span class="badge ${j.status}">${j.status}</span><span class="badge">${j.source.source_platform}</span><span class="badge">${j.category||'Khac'}</span></div><div class="title2">${j.source.title||j.id}</div><div class="excerpt">${excerpt(j.excerpt||'')}</div></div>`).join(''):'<div class="empty">Chưa có job.</div>'; [...box.querySelectorAll('.job')].forEach(n=>n.onclick=()=>selectJob(n.dataset.id)); }
function syncDetail(){ if(!active||!active.original_text){ el('detail').style.display='none'; el('detailEmpty').style.display='block'; return; } el('detail').style.display='block'; el('detailEmpty').style.display='none'; el('title').value=active.source.title||active.id; el('jobMeta').textContent=`${active.id} • ${active.source.source_platform} • ${active.source.source_url}`; el('originalText').value=active.original_text||''; el('proposedText').value=active.proposed_text||''; el('personalComment').value=active.personal_comment||''; el('mediaReview').value=active.media_review_status||'unknown'; el('sourceNote').value=active.source_compare_note||''; el('platformTarget').value=(active.platform_targets&&active.platform_targets[0])||'facebook'; el('publishResult').value=JSON.stringify(active.publish_result||{},null,2); el('statusLine').textContent=`Trạng thái: ${active.status} • Cập nhật: ${active.updated_at}`; }
async function loadJobs(){ const data=await api('/api/jobs'); jobs=data.jobs||[]; renderCategoryOptions(); if(active) active=jobs.find(j=>j.id===active.id)||null; renderJobs(); syncDetail(); }
async function selectJob(id){ active=jobs.find(j=>j.id===id)||null; renderJobs(); el('detail').style.display='none'; el('detailEmpty').style.display='block'; const data=await api(`/api/jobs/${encodeURIComponent(id)}`); active=data.job; renderJobs(); syncDetail(); }
async function saveJob(status){ if(!active) return; const payload={ proposed_text:el('proposedText').value, personal_comment:el('personalComment').value, media_review_status:el('mediaReview').value, source_compare_note:el('sourceNote').value }; if(status) payload.status=status; const data=await api(`/api/jobs/${encodeURIComponent(active.id)}`,{method:'PATCH',body:JSON.stringify(payload)}); active=data.job; await loadJobs(); await selectJob(active.id); }
async function publishJob(dryRun){ if(!active) return; await saveJob(); const body={ platform:el('platformTarget').value, dryRun, video_file:el('videoFile').value||undefined }; const data=await api(`/api/jobs/${encodeURIComponent(active.id)}/publish`,{method:'POST',body:JSON.stringify(body)}); active=data.job; await loadJobs(); await selectJob(active.id); alert(dryRun?'Đã test draft.':'Đã gửi lệnh đăng.'); }
el('refreshBtn').onclick=loadJobs; el('searchBox').oninput=renderJobs; el('statusFilter').onchange=renderJobs; el('platformFilter').onchange=renderJobs; el('categoryFilter').onchange=renderJobs; el('sortMode').onchange=renderJobs; el('scanBtn').onclick=async()=>{ await api('/api/scan',{method:'POST',body:JSON.stringify({sources:['facebook','youtube','tiktok'],limit:1500})}); await loadJobs(); alert('Quét xong.'); }; el('pasteBtn').onclick=async()=>{ const text=prompt('Dán toàn bộ nội dung bài Facebook'); if(!text) return; const sourceUrl=prompt('Link bài gốc (nếu có)','https://www.facebook.com/vukim.cuong.71')||'https://www.facebook.com/vukim.cuong.71'; const body=active&&active.source.source_platform==='facebook'?{job_id:active.id,text,source_url:sourceUrl,source_platform:'facebook'}:{text,source_url:sourceUrl,source_platform:'facebook'}; await api('/api/import/pasted-post',{method:'POST',body:JSON.stringify(body)}); await loadJobs(); alert('Đã lưu nội dung paste vào database.'); }; el('newManualBtn').onclick=async()=>{ const text=prompt('Nội dung mới'); if(!text) return; await api('/api/jobs/manual',{method:'POST',body:JSON.stringify({text})}); await loadJobs(); }; el('refreshSourceBtn').onclick=async()=>{ if(!active) return; await api(`/api/jobs/${encodeURIComponent(active.id)}/refresh-source`,{method:'POST'}); await loadJobs(); await selectJob(active.id); alert('Đã lấy lại nội dung gốc.'); }; el('transcribeBtn').onclick=async()=>{ if(!active) return; const source=prompt('Link video/audio hoặc đường dẫn file local để Agent-Reach transcribe',active.source.source_url||''); if(!source) return; const r=await api(`/api/jobs/${encodeURIComponent(active.id)}/transcribe-media`,{method:'POST',body:JSON.stringify({source})}); await loadJobs(); await selectJob(active.id); alert(r.ok?'Đã transcribe và ghi vào ghi chú.':'Transcribe lỗi, xem ghi chú/kết quả.'); }; el('saveBtn').onclick=()=>saveJob(); el('approveBtn').onclick=()=>saveJob('approved'); el('rejectBtn').onclick=()=>saveJob('rejected'); el('dryRunBtn').onclick=()=>publishJob(true); el('publishBtn').onclick=()=>publishJob(false); el('deleteBtn').onclick=async()=>{ if(!active) return; if(!confirm('Xóa job này?')) return; await api(`/api/jobs/${encodeURIComponent(active.id)}`,{method:'DELETE'}); active=null; await loadJobs(); };
loadJobs().catch(err=>{ document.body.innerHTML=`<div class="wrap"><div class="panel left"><h3>Lỗi</h3><div class="small">${err.message}</div><div class="small">Nếu có token, mở: <code>/?token=TOKEN</code></div></div></div>`; });
</script>
</body>
</html>
