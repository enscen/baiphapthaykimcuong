<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin nội dung - Thầy Kim Cương</title><style>
*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;background:#f7f1e6;color:#07182f}header{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid #eadfcb;z-index:2}.bar{max-width:1280px;margin:auto;padding:16px 22px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}h1{font-size:22px;margin:0 20px 0 0}.btn,button{border:1px solid #d6bd86;background:#fff;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;color:#07182f;text-decoration:none}.primary{background:#9a6a0b;color:white;border-color:#9a6a0b}.wrap{max-width:1280px;margin:24px auto;padding:0 22px;display:grid;grid-template-columns:360px 1fr;gap:18px}.list,.edit{background:white;border:1px solid #eadfcb;border-radius:18px;box-shadow:0 18px 55px rgba(6,27,51,.08)}.tools{padding:14px;border-bottom:1px solid #eadfcb;display:grid;gap:10px}.tools input,.tools select{width:100%;border:1px solid #d8c8aa;border-radius:10px;padding:11px;font:inherit}.items{max-height:calc(100vh - 210px);overflow:auto}.item{padding:13px 14px;border-bottom:1px solid #f0e5d3;cursor:pointer}.item:hover,.item.active{background:#fff7e8}.item b{display:block;font-size:14px}.item span{display:block;color:#697386;font-size:12px;margin-top:4px}.edit{padding:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:grid;gap:6px;font-size:13px;font-weight:800;color:#526070}input,select,textarea{border:1px solid #d8c8aa;border-radius:10px;padding:11px;font:inherit;background:#fff}textarea{min-height:260px;resize:vertical;line-height:1.55}.full{grid-column:1/-1}.status{color:#6b5a37;font-size:13px}.hint{background:#fff8e8;border:1px solid #eadfcb;border-radius:12px;padding:12px;margin-bottom:14px;color:#5f4b20}@media(max-width:900px){.wrap{grid-template-columns:1fr}.items{max-height:360px}}
</style></head><body><header><div class="bar"><h1>Admin nội dung</h1><a class="btn" href="index.html">Về website</a><button class="primary" id="saveLocal">Lưu trên máy</button><button id="exportJson">Xuất data.json</button><label class="btn">Nhập data.json<input id="importJson" type="file" accept="application/json" hidden></label><button id="clearLocal">Bỏ bản sửa local</button><span class="status" id="status">Đang tải...</span></div></header><main class="wrap"><aside class="list"><div class="tools"><input id="q" placeholder="Tìm tiêu đề/nội dung"><select id="platform"><option value="">Tất cả nền tảng</option><option value="facebook">Facebook</option><option value="tiktok">TikTok</option><option value="youtube">YouTube</option></select></div><div class="items" id="items"></div></aside><section class="edit"><div class="hint">Trang này sửa thủ công bằng trình duyệt. Bấm “Lưu trên máy” để xem ngay trên website này. Bấm “Xuất data.json” rồi thay file `data.json` trong repo để cập nhật GitHub Pages.</div><div class="grid"><label>ID<input id="id" readonly></label><label>Nền tảng<select id="p_platform"><option>facebook</option><option>tiktok</option><option>youtube</option></select></label><label>Nguồn<input id="source_account"></label><label>Link gốc<input id="source_url"></label><label>Ngày đăng<input id="published_at"></label><label>Thumbnail<input id="thumbnail_url"></label><label class="full">Tiêu đề<input id="title"></label><label class="full">Nội dung gốc<textarea id="original_text"></textarea></label><label class="full">Media URLs, mỗi dòng 1 link<textarea id="media_urls"></textarea></label></div></section></main><script>
const $=id=>document.getElementById(id);let data={posts:[]},posts=[],current=null;
const dateOf=p=>Date.parse(p.published_at||p.updated_at||p.created_at||'')||0;
const titleOf=p=>String(p.title||p.original_text||p.caption_or_text||p.id||'').split('\n').map(x=>x.trim()).find(Boolean)||'Chưa có tiêu đề';
function setStatus(s){$('status').textContent=s}
async function load(){const local=localStorage.getItem('bptkc_posts_override');data=local?JSON.parse(local):await fetch('./data.json').then(r=>r.json());posts=(data.posts||[]).sort((a,b)=>dateOf(b)-dateOf(a));renderList();setStatus(local?'Đang dùng bản sửa local':'Đang dùng data.json')}
function filtered(){const q=$('q').value.toLowerCase(),pf=$('platform').value;return posts.filter(p=>(!pf||p.platform===pf)&&(!q||(titleOf(p)+' '+(p.original_text||p.caption_or_text||'')).toLowerCase().includes(q)))}
function renderList(){const xs=filtered();$('items').innerHTML=xs.map(p=>`<div class="item ${current&&current.id===p.id?'active':''}" data-id="${p.id}"><b>${titleOf(p)}</b><span>${p.platform||''} · ${p.published_at||''}</span></div>`).join('')||'<div class="item">Không có nội dung</div>';document.querySelectorAll('.item[data-id]').forEach(x=>x.onclick=()=>openItem(x.dataset.id));if(!current&&xs[0])openItem(xs[0].id)}
function openItem(id){current=posts.find(p=>p.id===id);if(!current)return;for(const k of ['id','source_account','source_url','published_at','thumbnail_url','title','original_text'])$(k).value=current[k]||'';$('p_platform').value=current.platform||'facebook';$('media_urls').value=(current.media_urls||[]).join('\n');renderList()}
function applyForm(){if(!current)return;for(const k of ['source_account','source_url','published_at','thumbnail_url','title','original_text'])current[k]=$(k).value;current.platform=$('p_platform').value;current.caption_or_text=current.original_text;current.media_urls=$('media_urls').value.split('\n').map(x=>x.trim()).filter(Boolean)}
function download(name,text){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'application/json'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
$('saveLocal').onclick=()=>{applyForm();localStorage.setItem('bptkc_posts_override',JSON.stringify(data));setStatus('Đã lưu trên máy')};
$('exportJson').onclick=()=>{applyForm();download('data.json',JSON.stringify(data,null,2));setStatus('Đã xuất data.json')};
$('clearLocal').onclick=()=>{localStorage.removeItem('bptkc_posts_override');location.reload()};
$('importJson').onchange=async e=>{const f=e.target.files[0];if(!f)return;data=JSON.parse(await f.text());posts=(data.posts||[]).sort((a,b)=>dateOf(b)-dateOf(a));current=null;renderList();setStatus('Đã nhập file, nhớ lưu')};
['q','platform'].forEach(id=>$(id).oninput=renderList);['p_platform','source_account','source_url','published_at','thumbnail_url','title','original_text','media_urls'].forEach(id=>$(id).oninput=applyForm);load();
</script></body></html>
