name: Auto Update
on:
  schedule:
    - cron: "*/10 0-5 * * *"
    - cron: "0 */2 * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci && npm run build
      - run: python3 -m pip install --user yt-dlp
      - env:
          FACEBOOK_COOKIE_HEADER: ${{ secrets.FACEBOOK_COOKIE_HEADER }}
          FACEBOOK_READER_MODE: "cookies"
        run: node scripts/ci-update.js
      - run: node scripts/export-jobs.cjs
      - run: npm run ocr:tiktok
        env:
          TIKTOK_OCR_LIMIT: "30"
      - run: npm run thumbs:tiktok
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/jobs.json data.json deploy/data.json public/data.json tiktok-thumb-titles.json deploy/tiktok-thumb-titles.json public/tiktok-thumb-titles.json tiktok-thumb-title-attempts.json tiktok-title-skip.json assets/tiktok-thumbs deploy/assets/tiktok-thumbs public/assets/tiktok-thumbs
          git diff --cached --quiet || (git commit -m "Auto update" && git push)
