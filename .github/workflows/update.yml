name: Auto Update
on:
  schedule:
    - cron: "*/10 0-4 * * *"
    - cron: "0 5-23/2 * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install && npm run build
      - run: python3 -m pip install yt-dlp
      - env:
          FACEBOOK_COOKIE_HEADER: ${{ secrets.FACEBOOK_COOKIE_HEADER }}
          FACEBOOK_READER_MODE: "cookies"
        run: node scripts/ci-update.js
      - run: node scripts/export-jobs.cjs
      - run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/jobs.json deploy/data.json index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update" && git push)
