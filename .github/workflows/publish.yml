name: Publish Static Site
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static files
        run: |
          mkdir site
          cp index.html site/index.html
          cp data.json site/data.json
          cp tiktok-thumb-titles.json site/tiktok-thumb-titles.json
          cp tiktok-title-skip.json site/tiktok-title-skip.json
          cp enscen.html site/enscen.html
          cp -r assets site/assets
          cp -r cung-duong site/cung-duong
          cp -r gioi-thieu bai-giang video-ngan dao-trang site/
          touch site/.nojekyll
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true

